<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FORM / FRAME · Mobile Preview</title>
  <style>
    :root{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#171525;background:#ece9f4}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:radial-gradient(circle at 15% 15%,rgba(134,113,222,.18),transparent 28%),linear-gradient(145deg,#f6f4fb,#e7e2f0);display:grid;place-items:center;padding:24px}
    .stage{width:min(100%,470px)}
    .top{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin:0 6px 14px}
    .top small{display:block;color:#7969bc;font-size:10px;font-weight:900;letter-spacing:.16em}
    .top strong{display:block;margin-top:6px;font-size:20px;letter-spacing:-.04em}
    .top span{color:#7e778a;font-size:11px;font-weight:800}
    .phone{position:relative;width:390px;max-width:100%;height:min(844px,calc(100vh - 120px));min-height:640px;margin:0 auto;padding:12px;border:1px solid rgba(31,27,48,.18);border-radius:38px;background:#171522;box-shadow:0 30px 80px rgba(35,27,65,.28)}
    .phone::before{content:"";position:absolute;z-index:2;left:50%;top:8px;width:108px;height:23px;border-radius:0 0 16px 16px;background:#171522;transform:translateX(-50%);pointer-events:none}
    iframe{display:block;width:100%;height:100%;border:0;border-radius:27px;background:#fff}
    .foot{margin-top:12px;text-align:center;color:#81798e;font-size:11px;font-weight:750}
    @media(max-width:480px){body{padding:0;background:#fff}.stage{width:100%}.top,.foot{display:none}.phone{width:100%;height:100vh;min-height:100vh;padding:0;border:0;border-radius:0;box-shadow:none;background:#fff}.phone::before{display:none}iframe{border-radius:0}}
  </style>
</head>
<body>
  <main class="stage">
    <div class="top">
      <div><small>MOBILE QA · 390 PX</small><strong>FORM / FRAME</strong></div>
      <span>실제 앱 반응형 화면</span>
    </div>
    <div class="phone">
      <iframe src="/?mobile-preview=1#prompt" title="FORM / FRAME 모바일 프리뷰"></iframe>
    </div>
    <div class="foot">스크롤 · FORM/FRAME 전환 · 업로드 버튼을 직접 눌러볼 수 있어요.</div>
  </main>
</body>
</html>
