<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Luna Signal Aurora Preview</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f4f2ff}
iframe{display:block;width:100%;height:100%;border:0}
</style>
</head>
<body>
<iframe id="preview" src="/menu-preview.html" title="Luna Signal Aurora Preview"></iframe>
<script>
const frame=document.getElementById('preview');
frame.addEventListener('load',()=>{
  const doc=frame.contentDocument;
  if(!doc)return;
  const fontLink=doc.createElement('link');
  fontLink.rel='stylesheet';
  fontLink.href='https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/static/woff2/SUIT.css';
  doc.head.appendChild(fontLink);
  const style=doc.createElement('style');
  style.textContent=`
  .brand .signal{
    position:relative;
    display:inline-block;
    color:transparent!important;
    background:linear-gradient(110deg,#6f63ff 0%,#8fd8ff 14%,#d6b7ff 28%,#fff7d9 42%,#8ff0d0 56%,#ffb7dd 70%,#b9c4ff 84%,#786cff 100%)!important;
    background-size:260% 100%!important;
    -webkit-background-clip:text!important;
    background-clip:text!important;
    -webkit-text-stroke:1px rgba(110,98,170,.24)!important;
    filter:drop-shadow(0 2px 0 rgba(255,255,255,.85)) drop-shadow(0 8px 18px rgba(112,92,200,.18))!important;
    animation:auroraShift 8s ease-in-out infinite!important;
  }
  .brand .signal:before{
    content:"";
    position:absolute;
    inset:-8% -3%;
    pointer-events:none;
    background:linear-gradient(100deg,transparent 35%,rgba(255,255,255,.92) 49%,transparent 63%);
    transform:translateX(-130%) skewX(-18deg);
    mix-blend-mode:screen;
    animation:auroraGlint 6.5s ease-in-out infinite;
  }
  .brand .signal:after{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    background:
      radial-gradient(circle at 12% 28%,rgba(255,255,255,.98) 0 1px,transparent 2.2px),
      radial-gradient(circle at 33% 72%,rgba(255,248,210,.95) 0 1.2px,transparent 2.5px),
      radial-gradient(circle at 61% 18%,rgba(220,250,255,.98) 0 1px,transparent 2.2px),
      radial-gradient(circle at 84% 58%,rgba(255,224,246,.95) 0 1.2px,transparent 2.5px);
    animation:starTwinkle 3.8s ease-in-out infinite alternate;
    mix-blend-mode:screen;
  }
  .head h2{
    font-family:"SUIT","Pretendard","Noto Sans KR",sans-serif!important;
    font-size:29px!important;
    font-weight:700!important;
    letter-spacing:-.035em!important;
    line-height:1.22!important;
    color:#17182b!important;
    margin-top:8px!important;
    margin-bottom:12px!important;
  }
  .head p{
    font-family:"SUIT","Pretendard","Noto Sans KR",sans-serif!important;
    line-height:1.65!important;
  }
  @keyframes auroraShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
  @keyframes auroraGlint{0%,58%{transform:translateX(-130%) skewX(-18deg);opacity:0}66%{opacity:.9}82%{transform:translateX(135%) skewX(-18deg);opacity:0}100%{opacity:0}}
  @keyframes starTwinkle{0%{opacity:.35;transform:scale(.99)}100%{opacity:1;transform:scale(1.015)}}
  @media(prefers-reduced-motion:reduce){.brand .signal,.brand .signal:before,.brand .signal:after{animation:none!important}}
  `;
  doc.head.appendChild(style);
});
</script>
</body>
</html>
