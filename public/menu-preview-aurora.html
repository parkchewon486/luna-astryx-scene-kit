<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Luna Signal Aurora Preview</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f4f2ff}
iframe{display:block;width:100%;height:100%;border:0}
</style>
</head>
<body>
<iframe id="preview" src="/menu-preview.html" title="Luna Signal Aurora Preview"></iframe>
<script>
const frame=document.getElementById('preview');
frame.addEventListener('load',()=>{
  const doc=frame.contentDocument;
  if(!doc)return;
  const fontLink=doc.createElement('link');
  fontLink.rel='stylesheet';
  fontLink.href='https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/static/woff2/SUIT.css';
  doc.head.appendChild(fontLink);
  const style=doc.createElement('style');
  style.textContent=`
  .brand .signal{position:relative;display:inline-block;color:transparent!important;background:linear-gradient(110deg,#6f63ff 0%,#8fd8ff 14%,#d6b7ff 28%,#fff7d9 42%,#8ff0d0 56%,#ffb7dd 70%,#b9c4ff 84%,#786cff 100%)!important;background-size:260% 100%!important;-webkit-background-clip:text!important;background-clip:text!important;-webkit-text-stroke:1px rgba(110,98,170,.24)!important;filter:drop-shadow(0 2px 0 rgba(255,255,255,.85)) drop-shadow(0 8px 18px rgba(112,92,200,.18))!important;animation:auroraShift 8s ease-in-out infinite!important}
  .brand .signal:before{content:"";position:absolute;inset:-8% -3%;pointer-events:none;background:linear-gradient(100deg,transparent 35%,rgba(255,255,255,.92) 49%,transparent 63%);transform:translateX(-130%) skewX(-18deg);mix-blend-mode:screen;animation:auroraGlint 6.5s ease-in-out infinite}
  .brand .signal:after{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 12% 28%,rgba(255,255,255,.98) 0 1px,transparent 2.2px),radial-gradient(circle at 33% 72%,rgba(255,248,210,.95) 0 1.2px,transparent 2.5px),radial-gradient(circle at 61% 18%,rgba(220,250,255,.98) 0 1px,transparent 2.2px),radial-gradient(circle at 84% 58%,rgba(255,224,246,.95) 0 1.2px,transparent 2.5px);animation:starTwinkle 3.8s ease-in-out infinite alternate;mix-blend-mode:screen}
  .head h2{font-family:"SUIT","Pretendard","Noto Sans KR",sans-serif!important;font-size:29px!important;font-weight:700!important;letter-spacing:-.035em!important;line-height:1.22!important;color:#17182b!important;margin-top:8px!important;margin-bottom:12px!important}
  .head p{font-family:"SUIT","Pretendard","Noto Sans KR",sans-serif!important;line-height:1.65!important}
  .ideaGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}.ideaCard{padding:24px;border:1px solid #e9e4f4;border-radius:22px;background:#fff}.ideaCard h3{margin:10px 0 12px;font-size:21px}.ideaBlock{margin-top:16px;padding-top:15px;border-top:1px solid #eeeaf6}.ideaBlock b{display:block;margin-bottom:7px;font-size:12px;letter-spacing:.08em;color:#765eb8}.ideaBlock p{margin:0;color:#686276;line-height:1.65;font-size:14px}.ideaActions{display:flex;gap:10px;margin-top:18px}.ideaActions button,.ideaActions a{display:inline-flex;align-items:center;justify-content:center;padding:10px 14px;border-radius:12px;border:1px solid #ddd6ef;background:#f7f4ff;color:#3d3554;font-weight:800;font-size:13px;text-decoration:none;cursor:pointer}.ideaActions .primary{background:#292536;color:#fff;border-color:#292536}.copyDone{margin-left:8px;color:#6f58b2;font-size:12px;font-weight:800}
  @media(max-width:820px){.ideaGrid{grid-template-columns:1fr}}
  @keyframes auroraShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
  @keyframes auroraGlint{0%,58%{transform:translateX(-130%) skewX(-18deg);opacity:0}66%{opacity:.9}82%{transform:translateX(135%) skewX(-18deg);opacity:0}100%{opacity:0}}
  @keyframes starTwinkle{0%{opacity:.35;transform:scale(.99)}100%{opacity:1;transform:scale(1.015)}}
  @media(prefers-reduced-motion:reduce){.brand .signal,.brand .signal:before,.brand .signal:after{animation:none!important}}
  `;
  doc.head.appendChild(style);

  const nav=doc.querySelector('.nav');
  const promptButton=nav?.querySelector('[data-tab="prompt"]');
  if(nav && promptButton && !nav.querySelector('[data-tab="write"]')){
    const writeButton=doc.createElement('button');
    writeButton.type='button';
    writeButton.dataset.tab='write';
    writeButton.textContent='오늘 뭐 쓰지?';
    nav.insertBefore(writeButton,promptButton);

    const content=doc.querySelector('.content');
    const writePanel=doc.createElement('div');
    writePanel.id='write';
    writePanel.className='panel hidden';
    writePanel.innerHTML=`
      <div class="head"><div><div class="eyebrow">WRITE TODAY</div><h2>오늘 뭐 쓰지?</h2><p>지금 반응 오는 소재를 골라 글 각도, 댓글 질문, 초안까지 바로 이어갑니다.</p></div></div>
      <div class="ideaGrid">
        <article class="ideaCard">
          <div class="tag">AI VIDEO · 오늘 추천</div>
          <h3>Seedance로 만든 짧은 인물 영상이 왜 잘 퍼질까</h3>
          <div class="ideaBlock"><b>글 각도</b><p>기술 소개보다 직접 써본 사람의 놀란 지점을 앞에 둡니다. 얼굴 유지, 움직임, 제작 시간 세 가지를 비교하는 글이 잘 맞아요.</p></div>
          <div class="ideaBlock"><b>댓글 질문</b><p>여러분은 영상에서 얼굴 유지와 움직임 중 어느 쪽을 더 중요하게 보세요?</p></div>
          <div class="ideaBlock"><b>초안</b><p class="draftText">요즘 AI 영상은 화려한 장면보다 얼굴을 얼마나 오래 지키느냐에서 차이가 나더라고요. Seedance로 짧은 인물 영상을 만들어보니, 움직임보다 먼저 보게 된 건 표정이었습니다. 여러분은 어떤 부분부터 확인하나요?</p></div>
          <div class="ideaActions"><button class="primary copyDraft">초안 복사</button><a href="https://seed.bytedance.com/en/seedance" target="_blank" rel="noreferrer">원문 링크</a><span class="copyDone"></span></div>
        </article>
        <article class="ideaCard">
          <div class="tag">VIBE CODING · 반응 상승</div>
          <h3>웹앱을 만들고도 사람들이 못 쓰는 이유</h3>
          <div class="ideaBlock"><b>글 각도</b><p>기능 자랑보다 사용자가 어디서 멈추는지 보여줍니다. 메뉴가 길어 스크롤하는 불편, 프리뷰 확인 과정, 배포 전 수정 이야기를 담아요.</p></div>
          <div class="ideaBlock"><b>댓글 질문</b><p>웹앱에서 기능 수보다 먼저 보는 건 디자인인가요, 사용 편의인가요?</p></div>
          <div class="ideaBlock"><b>초안</b><p class="draftText">웹앱 기능을 늘리는 것보다 더 오래 걸린 건 사람들이 길을 잃지 않게 만드는 일이었어요. 메뉴 하나 옮기고, 글자 하나 바꾸는 게 별것 아닌 듯 보여도 체감은 꽤 컸습니다. 여러분은 웹앱을 열면 어디부터 보나요?</p></div>
          <div class="ideaActions"><button class="primary copyDraft">초안 복사</button><a href="https://vercel.com" target="_blank" rel="noreferrer">원문 링크</a><span class="copyDone"></span></div>
        </article>
      </div>`;
    content?.insertBefore(writePanel,doc.getElementById('prompt'));

    const allButtons=()=>[...doc.querySelectorAll('[data-tab]')];
    const allPanels=()=>[...doc.querySelectorAll('.panel')];
    writeButton.addEventListener('click',()=>{
      allButtons().forEach(x=>x.classList.remove('active'));
      allPanels().forEach(x=>x.classList.add('hidden'));
      writeButton.classList.add('active');
      writePanel.classList.remove('hidden');
    });
    writePanel.querySelectorAll('.copyDraft').forEach(button=>button.addEventListener('click',async()=>{
      const card=button.closest('.ideaCard');
      const text=card.querySelector('.draftText').textContent.trim();
      await navigator.clipboard.writeText(text);
      const done=card.querySelector('.copyDone');
      done.textContent='복사됨';
      setTimeout(()=>done.textContent='',1400);
    }));
  }
});
</script>
</body>
</html>
