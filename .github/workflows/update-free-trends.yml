name: Update free trend radar

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/update-free-trends.yml'
      - 'api/free-trends.ts'
      - 'api/free-trends-ranked.ts'
  schedule:
    - cron: '17 * * * *'

permissions:
  contents: write

concurrency:
  group: free-trend-radar
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Check whether refresh is due
        id: refresh
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'public/data/trends.json';
          const minimumAgeMs = 3 * 60 * 60 * 1000;
          const eventName = process.env.GITHUB_EVENT_NAME ?? '';
          const forceRefresh = eventName === 'push' || eventName === 'workflow_dispatch';
          let refresh = forceRefresh;
          let reason = forceRefresh ? `forced by ${eventName}` : 'missing current data';

          if (!forceRefresh) {
            try {
              const data = JSON.parse(fs.readFileSync(path, 'utf8'));
              const generatedAt = Date.parse(data.generated_at);
              if (Number.isFinite(generatedAt)) {
                const ageMs = Date.now() - generatedAt;
                refresh = ageMs >= minimumAgeMs;
                reason = refresh
                  ? `last successful scan is ${Math.floor(ageMs / 60000)} minutes old`
                  : `last successful scan is only ${Math.floor(ageMs / 60000)} minutes old`;
              }
            } catch (error) {
              refresh = true;
              reason = `could not read current scan time: ${error.message}`;
            }
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `refresh=${refresh}\n`);
          console.log(`${refresh ? 'Refresh required' : 'Refresh skipped'}: ${reason}`);
          NODE

      - name: Fetch latest public trend data
        if: steps.refresh.outputs.refresh == 'true'
        run: |
          mkdir -p public/data
          curl --fail --location --retry 3 --retry-all-errors --retry-delay 10 \
            --connect-timeout 15 --max-time 120 \
            "https://lunakim-studio.vercel.app/api/free-trends-ranked?source=github-actions&ts=$(date +%s)" \
            --output /tmp/trends.json

      - name: Validate result
        if: steps.refresh.outputs.refresh == 'true'
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = '/tmp/trends.json';
          const data = JSON.parse(fs.readFileSync(path, 'utf8'));
          if (!data || !Array.isArray(data.items) || data.items.length === 0) {
            throw new Error('표시 가능한 핫이슈 항목이 없는 응답입니다.');
          }
          if (typeof data.generated_at !== 'string') {
            throw new Error('generated_at이 없는 응답입니다.');
          }
          if (typeof data.successful_sources !== 'number' || data.successful_sources < 1) {
            throw new Error('성공한 수집 출처가 없습니다.');
          }
          if (!Array.isArray(data.source_diagnostics) || data.source_diagnostics.length !== data.checked_sources) {
            throw new Error('사이트별 수집 진단 정보가 없거나 불완전합니다.');
          }
          fs.writeFileSync('public/data/trends.json', JSON.stringify(data, null, 2) + '\n');
          NODE

      - name: Commit updated data
        if: steps.refresh.outputs.refresh == 'true'
        run: |
          if git diff --quiet -- public/data/trends.json; then
            echo "No trend data changes"
            exit 0
          fi
          git config user.name "luna-trend-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/data/trends.json
          git commit -m "Update free trend radar data"
          git pull --rebase origin main
          git push origin HEAD:main
