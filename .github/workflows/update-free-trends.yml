name: Update free trend radar

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */3 * * *'

permissions:
  contents: write

concurrency:
  group: free-trend-radar
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch latest public trend data
        run: |
          mkdir -p public/data
          curl --fail --location --retry 2 --max-time 90 \
            "https://lunakim-studio.vercel.app/api/free-trends?source=github-actions&ts=$(date +%s)" \
            --output /tmp/trends.json

      - name: Validate result
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = '/tmp/trends.json';
          const data = JSON.parse(fs.readFileSync(path, 'utf8'));
          if (!data || !Array.isArray(data.items)) {
            throw new Error('items 배열이 없는 응답입니다.');
          }
          if (typeof data.generated_at !== 'string') {
            throw new Error('generated_at이 없는 응답입니다.');
          }
          fs.writeFileSync('public/data/trends.json', JSON.stringify(data, null, 2) + '\n');
          NODE

      - name: Commit updated data
        run: |
          if git diff --quiet -- public/data/trends.json; then
            echo "No trend data changes"
            exit 0
          fi
          git config user.name "luna-trend-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/data/trends.json
          git commit -m "Update free trend radar data"
          git push
