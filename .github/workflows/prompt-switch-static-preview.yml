name: Prompt Switch Static Preview

on:
  push:
    branches:
      - preview/prompt-switch-mobile-upload-v6
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: prompt-switch-static-preview
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout preview branch
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static preview
        run: npm run build -- --base=./

      - name: Publish static preview branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd dist
          touch .nojekyll
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Static preview for $GITHUB_SHA [skip ci]"
          git branch -M prompt-switch-static-preview
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin prompt-switch-static-preview
